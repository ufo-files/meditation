<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meditation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main aria-labelledby="app-title">
    <canvas id="universe" aria-label="Mapped universe meditation visualizer"></canvas>

    <div class="topbar">
      <section class="brand" aria-label="Session status">
        <a class="owner-label" href="https://github.com/ufo-files">UFO Files</a>
        <h1 id="app-title">
          <span class="app-switcher">
            <span class="app-switcher-text">Meditation</span>
            <select id="app-switcher" aria-label="Application">
              <option value="https://ufo-files.github.io/meditation/" selected>Meditation</option>
              <option value="https://ufo-files.github.io/dog-whistle/">Dog Whistle</option>
              <option value="https://ufo-files.github.io/relationship-graph/">Relationship Graph</option>
            </select>
          </span>
        </h1>
        <div class="meta" id="status" role="status" aria-live="polite">Idle / universe mapped</div>
      </section>

      <form class="controls" id="controls" aria-label="Meditation controls">
        <button id="start" type="button">Start</button>
        <label class="field" for="volume">
          <span>Volume</span>
          <input id="volume" type="range" min="0" max="0.8" value="0.24" step="0.01">
        </label>
        <label class="field" for="beat-bpm">
          <span>Heart</span>
          <select id="beat-bpm">
            <option value="45" selected>45 bpm</option>
            <option value="60">60 bpm</option>
            <option value="75">75 bpm</option>
            <option value="90">90 bpm</option>
          </select>
        </label>
        <label class="toggle" for="binaural">
          <span>Binaural mode</span>
          <input id="binaural" type="checkbox" checked>
          <i aria-hidden="true"></i>
        </label>
      </form>
    </div>

    <section class="readout" aria-label="Meditation layers">
      <div class="layer-control" data-layer-control="universe">
        <span>6,000 stars</span>
        <b>HYG mapped universe</b>
        <label class="layer-switch" aria-label="Toggle mapped universe">
          <input class="layer-toggle" type="checkbox" data-layer="universe" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="breath">
        <span>4 / 4 / 4 / 4</span>
        <b>Box breath core</b>
        <label class="layer-switch" aria-label="Toggle breath core">
          <input class="layer-toggle" type="checkbox" data-layer="breath" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="beat">
        <span id="beat-label">45 bpm</span>
        <b>Heart-rate field</b>
        <label class="layer-switch" aria-label="Toggle beat field">
          <input class="layer-toggle" type="checkbox" data-layer="beat" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="drone">
        <span>110 Hz / 220 Hz</span>
        <b>Low drone</b>
        <label class="layer-switch" aria-label="Toggle low drone">
          <input class="layer-toggle" type="checkbox" data-layer="drone" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
      <div class="layer-control" data-layer-control="music">
        <span>16 sec phrase</span>
        <b>Lo-fi music layer</b>
        <label class="layer-switch" aria-label="Toggle lo-fi music layer">
          <input class="layer-toggle" type="checkbox" data-layer="music" checked>
          <i aria-hidden="true"></i>
        </label>
      </div>
    </section>
  </main>
  <footer class="site-motto">Fides soli veritati</footer>

  <script src="data/universe-stars.js"></script>
  <script src="script.js"></script>
</body>
</html>
